apiVersion: v1
kind: Service
metadata:
  name: {{ include "java-cicd-demo.fullname" . }}-service
  labels:
    app: {{ include "java-cicd-demo.name" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "java-cicd-demo.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
